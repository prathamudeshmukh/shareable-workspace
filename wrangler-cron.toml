name = "shareable-workspace-cleanup"
main = "worker/cleanup-cron.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Shares the same D1 and R2 bindings as the main worker
[[d1_databases]]
binding = "DB"
database_name = "workspaces-db"
database_id = "placeholder-replace-after-create"

[[r2_buckets]]
binding = "FILES"
bucket_name = "workspace-files"

[triggers]
crons = ["* * * * *"]

[vars]
PARTYKIT_HOST = "shareable-workspace.your-account.partykit.dev"
