name = "shareable-workspace"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "FILES"
bucket_name = "workspace-files"

[[d1_databases]]
binding = "DB"
database_name = "workspaces-db"
database_id = "placeholder-replace-after-create"

[triggers]
crons = ["* * * * *"]

[vars]
PARTYKIT_HOST = "localhost:1999"
