name = "shareable-workspace"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "app.prathamesh.cloud/workspace*", zone_name = "prathamesh.cloud" },
  { pattern = "app.prathamesh.cloud/api/*", zone_name = "prathamesh.cloud" }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[r2_buckets]]
binding = "FILES"
bucket_name = "workspace-files"

[[d1_databases]]
binding = "DB"
database_name = "workspaces-db"
database_id = "1dd5b8e8-ec8f-4d3f-88a6-223239f53021"
migrations_dir = "migrations"

[triggers]
crons = ["* * * * *"]

[vars]
PARTYKIT_HOST = "https://shareable-workspace.prathamudeshmukh.partykit.dev"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
